name: Build - macOS arm64

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:
    inputs:
      generate_assets:
        type: boolean
        description: Force asset generation (ignored on tag pushes)
        default: false

env:
  APP_NAME: CIDE
  APP_NAME_LC: cide
  ASSETS_REPOSITORY: ${{ github.repository }}
  BINARY_NAME: cide
  GH_REPO_PATH: ${{ github.repository }}
  GLOBAL_DIRNAME: CIDE
  ORG_NAME: ${{ github.repository_owner }}
  OS_NAME: osx
  TUNNEL_APP_NAME: cide-tunnel
  VSCODE_ARCH: arm64
  VSCODE_QUALITY: stable

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clone VSCode repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: . get_repo.sh

      - name: Download bundled extensions
        run: ./get_extensions.sh

      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHOULD_BUILD: "yes"
          SHOULD_BUILD_REH: "no"
          SHOULD_BUILD_REH_WEB: "no"
          CI_BUILD: "yes"
        run: ./build.sh

      - name: Prepare assets
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.generate_assets == 'true'
        env:
          SHOULD_BUILD_REH: "no"
          SHOULD_BUILD_REH_WEB: "no"
          SHOULD_BUILD_CLI: "no"
        run: ./prepare_assets.sh

      - name: Upload zip
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.generate_assets == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: CIDE-darwin-arm64
          path: assets/*.zip
          retention-days: 7

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: assets/*.zip
          draft: false
          prerelease: false
